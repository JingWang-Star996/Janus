<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>打砖块 - Neon Breakout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0f0f2f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        .game-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px;
            width: 100%;
            max-width: 500px;
        }

        .game-title {
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }

        .info-panel {
            display: flex;
            gap: 20px;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            width: 100%;
            justify-content: space-around;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .info-label {
            font-size: 0.7em;
            color: rgba(0, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            min-width: 50px;
            text-align: center;
        }

        .info-value.lives {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.8);
        }

        .info-value.level {
            color: #ffd93d;
            text-shadow: 0 0 10px rgba(255, 217, 61, 0.8);
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                inset 0 0 30px rgba(0, 100, 255, 0.2);
            border: 2px solid rgba(0, 255, 255, 0.4);
            width: 100%;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 100%);
            width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            padding: 12px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            flex: 1;
            min-width: 80px;
            max-width: 120px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:active::before {
            left: 100%;
        }

        .btn-start {
            background: linear-gradient(135deg, #00c9ff, #00ff88);
            color: #0a0a1a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .btn-start:active {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: scale(0.98);
        }

        .btn-pause {
            background: linear-gradient(135deg, #ffd93d, #ff9500);
            color: #0a0a1a;
            box-shadow: 0 0 15px rgba(255, 217, 61, 0.4);
        }

        .btn-pause:active {
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.6);
            transform: scale(0.98);
        }

        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        .btn-restart:active {
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }

        .overlay-score {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.8);
        }

        .glow-effect {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            pointer-events: none;
        }

        .glow-1 {
            top: -100px;
            left: -100px;
            background: #00ffff;
            animation: pulse 4s ease-in-out infinite;
        }

        .glow-2 {
            bottom: -100px;
            right: -100px;
            background: #ff00ff;
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* 移动端提示 */
        .mobile-hint {
            font-size: 0.75em;
            color: rgba(0, 255, 255, 0.6);
            text-align: center;
            margin-top: 5px;
        }

        /* 横屏优化 */
        @media (orientation: landscape) and (max-height: 500px) {
            .game-container {
                flex-direction: row;
                gap: 15px;
            }
            .info-panel {
                flex-direction: column;
                width: auto;
                padding: 10px;
            }
            .controls {
                flex-direction: column;
                width: auto;
            }
            .btn {
                min-width: 60px;
                padding: 8px 15px;
            }
        }

        /* 小屏幕优化 */
        @media (max-width: 360px) {
            .game-title { font-size: 1.2em; }
            .info-label { font-size: 0.65em; }
            .info-value { font-size: 1em; }
            .btn { font-size: 0.8em; padding: 10px 15px; }
        }
    </style>
</head>
<body>
    <div class="glow-effect glow-1"></div>
    <div class="glow-effect glow-2"></div>

    <div class="game-container">
        <h1 class="game-title">🎮 NEON BREAKOUT</h1>

        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">得分</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">生命</span>
                <span class="info-value lives" id="lives">❤️❤️❤️</span>
            </div>
            <div class="info-item">
                <span class="info-label">关卡</span>
                <span class="info-value level" id="level">1</span>
            </div>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div class="overlay" id="pauseOverlay">
                <div class="overlay-title">⏸️ 已暂停</div>
                <div class="overlay-score">当前得分：<span id="pauseScore">0</span></div>
                <div class="mobile-hint">点击继续或按空格键</div>
            </div>

            <div class="overlay" id="gameOverOverlay">
                <div class="overlay-title">💀 游戏结束</div>
                <div class="overlay-score">最终得分：<span id="finalScore">0</span></div>
                <button class="btn btn-start" onclick="restartGame()">🔄 重新开始</button>
            </div>

            <div class="overlay" id="levelCompleteOverlay">
                <div class="overlay-title">🎉 关卡完成!</div>
                <div class="overlay-score">进入下一关...</div>
            </div>

            <div class="overlay" id="winOverlay">
                <div class="overlay-title">🏆 恭喜通关!</div>
                <div class="overlay-score">最终得分：<span id="winScore">0</span></div>
                <button class="btn btn-start" onclick="restartGame()">🔄 再玩一次</button>
            </div>

            <div class="overlay" id="startOverlay">
                <div class="overlay-title">👋 欢迎来到打砖块!</div>
                <div class="overlay-score">滑动控制挡板<br>或按左右方向键</div>
                <button class="btn btn-start" onclick="startGame()">▶️ 开始游戏</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">▶️ 开始</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>⏸️ 暂停</button>
            <button class="btn btn-restart" id="restartBtn">🔄 重置</button>
        </div>

        <div class="mobile-hint">📱 滑动屏幕控制挡板 | 双击暂停</div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');

        // 响应式 canvas 尺寸
        function resizeCanvas() {
            const wrapperWidth = canvasWrapper.clientWidth;
            const aspectRatio = 4 / 3;
            canvas.width = wrapperWidth;
            canvas.height = wrapperWidth * aspectRatio;
            
            // 根据 canvas 宽度调整游戏参数
            updateGameScale();
        }

        let gameScale = 1;
        function updateGameScale() {
            gameScale = canvas.width / 400; // 基准宽度 400
        }

        // 游戏常量（会根据 scale 调整）
        function getGameConstants() {
            return {
                PADDLE_WIDTH: 100 * gameScale,
                PADDLE_HEIGHT: 15 * gameScale,
                PADDLE_Y: canvas.height - 50 * gameScale,
                BALL_RADIUS: 8 * gameScale,
                BRICK_ROWS: 5,
                BRICK_COLS: 8,
                BRICK_WIDTH: (canvas.width - 50 * gameScale) / 8,
                BRICK_HEIGHT: 25 * gameScale,
                BRICK_PADDING: 5 * gameScale,
                BRICK_OFFSET_TOP: 50 * gameScale,
                BRICK_OFFSET_LEFT: 25 * gameScale
            };
        }

        let C = getGameConstants();

        // 砖块类型
        const BRICK_TYPES = {
            NORMAL: { color: '#00ffff', health: 1, score: 10 },
            STRONG: { color: '#00ff00', health: 2, score: 20 },
            HARD: { color: '#ffff00', health: 3, score: 30 },
            DANGER: { color: '#ff0000', health: 1, score: 50, speedBoost: true },
            POWER: { color: '#ff00ff', health: 1, score: 40, dropPowerUp: true },
            LUCKY: { color: '#ffd700', health: 1, score: 100, random: true }
        };

        // 道具类型
        const POWERUPS = {
            WIDE: { color: '#00ff00', effect: 'wide', duration: 30000 },
            NARROW: { color: '#ff0000', effect: 'narrow', duration: 30000 },
            MULTIBALL: { color: '#00ffff', effect: 'multiball' },
            SLOW: { color: '#0000ff', effect: 'slow', duration: 20000 },
            FAST: { color: '#ff8800', effect: 'fast', duration: 20000 },
            EXTRA_LIFE: { color: '#ff69b4', effect: 'extralife' }
        };

        // ==================== 游戏状态 ====================
        let gameState = {
            score: 0,
            lives: 3,
            level: 1,
            isRunning: false,
            isPaused: false,
            isGameOver: false,
            isWin: false,
            combo: 0,
            lastHitTime: 0
        };

        let paddle = { x: 0, width: 0 };
        let balls = [];
        let bricks = [];
        let powerUps = [];
        let particles = [];
        let activeEffects = {};

        // ==================== 触摸/鼠标控制 ====================
        let isTouching = false;
        let lastTouchX = 0;
        let lastTapTime = 0;

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isTouching = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            lastTouchX = touch.clientX - rect.left;
            
            // 双击检测（暂停）
            const now = Date.now();
            if (now - lastTapTime < 300) {
                togglePause();
            }
            lastTapTime = now;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isTouching) return;
            
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            
            // 直接映射触摸位置到挡板
            paddle.x = touchX - paddle.width / 2;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isTouching = false;
        }, { passive: false });

        // 鼠标事件（桌面端）
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
        });

        // 键盘事件
        let keys = { left: false, right: false };
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ' || e.key === 'p' || e.key === 'P') togglePause();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
        });

        // ==================== 初始化 ====================
        function initGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.isGameOver = false;
            gameState.isWin = false;
            activeEffects = {};
            initLevel(1);
        }

        function initLevel(level) {
            C = getGameConstants();
            balls = [{
                x: canvas.width / 2,
                y: C.PADDLE_Y - C.BALL_RADIUS - 1,
                vx: 3 * gameScale * (Math.random() > 0.5 ? 1 : -1),
                vy: -(4 + level * 0.5) * gameScale,
                speed: (4 + level * 0.5) * gameScale,
                isFire: false
            }];
            
            paddle.width = C.PADDLE_WIDTH;
            paddle.x = canvas.width / 2 - paddle.width / 2;
            powerUps = [];
            particles = [];
            
            createBricks(level);
            updateUI();
        }

        function createBricks(level) {
            bricks = [];
            const patterns = getLevelPattern(level);
            
            for (let row = 0; row < C.BRICK_ROWS; row++) {
                bricks[row] = [];
                for (let col = 0; col < C.BRICK_COLS; col++) {
                    const patternType = patterns[row] ? (patterns[row][col % patterns[row].length] || 'NORMAL') : 'NORMAL';
                    const type = BRICK_TYPES[patternType] || BRICK_TYPES.NORMAL;
                    
                    bricks[row][col] = {
                        x: C.BRICK_OFFSET_LEFT + col * (C.BRICK_WIDTH + C.BRICK_PADDING),
                        y: C.BRICK_OFFSET_TOP + row * (C.BRICK_HEIGHT + C.BRICK_PADDING),
                        width: C.BRICK_WIDTH,
                        height: C.BRICK_HEIGHT,
                        ...type,
                        maxHealth: type.health,
                        visible: true
                    };
                }
            }
        }

        function getLevelPattern(level) {
            const patterns = {
                1: [['NORMAL', 'NORMAL', 'NORMAL', 'NORMAL']],
                2: [['NORMAL', 'STRONG', 'NORMAL', 'STRONG']],
                3: [['NORMAL', 'STRONG', 'HARD', 'STRONG']],
                4: [['DANGER', 'NORMAL', 'STRONG', 'DANGER']],
                5: [['POWER', 'NORMAL', 'HARD', 'POWER']]
            };
            return patterns[Math.min(level, 5)] || patterns[5];
        }

        // ==================== 游戏逻辑 ====================
        function update() {
            if (gameState.isPaused || gameState.isGameOver || gameState.isWin) return;

            updatePaddle();
            balls.forEach(ball => updateBall(ball));
            updatePowerUps();
            updateParticles();
            updateEffects();
            checkLevelComplete();
        }

        function updatePaddle() {
            const speed = 8 * gameScale;
            if (keys.left) paddle.x -= speed;
            if (keys.right) paddle.x += speed;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
        }

        function updateBall(ball) {
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 墙壁碰撞
            if (ball.x - C.BALL_RADIUS <= 0 || ball.x + C.BALL_RADIUS >= canvas.width) {
                ball.vx = -ball.vx;
                ball.x = Math.max(C.BALL_RADIUS, Math.min(canvas.width - C.BALL_RADIUS, ball.x));
            }
            if (ball.y - C.BALL_RADIUS <= 0) {
                ball.vy = -ball.vy;
                ball.y = C.BALL_RADIUS;
            }

            // 掉落
            if (ball.y - C.BALL_RADIUS >= canvas.height) {
                const ballIndex = balls.indexOf(ball);
                if (ballIndex > -1) balls.splice(ballIndex, 1);
                if (balls.length === 0) loseLife();
                return;
            }

            // 挡板碰撞
            if (ball.y + C.BALL_RADIUS >= C.PADDLE_Y &&
                ball.y - C.BALL_RADIUS <= C.PADDLE_Y + C.PADDLE_HEIGHT &&
                ball.x >= paddle.x &&
                ball.x <= paddle.x + paddle.width &&
                ball.vy > 0) {
                
                const hitPos = (ball.x - paddle.x) / paddle.width;
                const angle = (hitPos - 0.5) * Math.PI * 0.6;
                ball.vx = ball.speed * Math.sin(angle);
                ball.vy = -ball.speed * Math.cos(angle);
                ball.y = C.PADDLE_Y - C.BALL_RADIUS;
            }

            // 砖块碰撞
            if (!ball.isFire) checkBrickCollision(ball);
        }

        function checkBrickCollision(ball) {
            for (let row = 0; row < C.BRICK_ROWS; row++) {
                for (let col = 0; col < C.BRICK_COLS; col++) {
                    const brick = bricks[row][col];
                    if (!brick.visible) continue;

                    if (ball.x + C.BALL_RADIUS > brick.x &&
                        ball.x - C.BALL_RADIUS < brick.x + brick.width &&
                        ball.y + C.BALL_RADIUS > brick.y &&
                        ball.y - C.BALL_RADIUS < brick.y + brick.height) {
                        
                        brick.health--;
                        ball.vy = -ball.vy;

                        if (brick.health <= 0) destroyBrick(brick, row, col);
                        else createParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color, 3);
                        return;
                    }
                }
            }
        }

        function destroyBrick(brick, row, col) {
            brick.visible = false;
            
            const now = Date.now();
            gameState.combo = (now - gameState.lastHitTime < 3000) ? gameState.combo + 1 : 1;
            gameState.lastHitTime = now;

            let comboMultiplier = 1;
            if (gameState.combo >= 50) comboMultiplier = 3;
            else if (gameState.combo >= 20) comboMultiplier = 2;
            else if (gameState.combo >= 10) comboMultiplier = 1.5;
            else if (gameState.combo >= 5) comboMultiplier = 1.2;

            gameState.score += Math.floor(brick.score * comboMultiplier * (1 + gameState.level * 0.1));
            
            if (brick.dropPowerUp || (Math.random() < 0.05)) spawnPowerUp(brick.x + brick.width / 2, brick.y);
            createParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color, 8);

            if (brick.speedBoost) {
                balls.forEach(ball => {
                    ball.speed *= 1.2;
                    ball.vx *= 1.2;
                    ball.vy *= 1.2;
                });
            }
            updateUI();
        }

        function spawnPowerUp(x, y) {
            const types = Object.keys(POWERUPS);
            const type = types[Math.floor(Math.random() * types.length)];
            powerUps.push({ x, y, width: 30 * gameScale, height: 15 * gameScale, vy: 2 * gameScale, ...POWERUPS[type] });
        }

        function updatePowerUps() {
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                p.y += p.vy;

                if (p.y + p.height >= C.PADDLE_Y && p.y <= C.PADDLE_Y + C.PADDLE_HEIGHT &&
                    p.x + p.width/2 >= paddle.x && p.x - p.width/2 <= paddle.x + paddle.width) {
                    applyPowerUp(p);
                    powerUps.splice(i, 1);
                    continue;
                }
                if (p.y > canvas.height) powerUps.splice(i, 1);
            }
        }

        function applyPowerUp(powerUp) {
            gameState.score += 50;
            
            switch(powerUp.effect) {
                case 'wide':
                    paddle.width = Math.min(200 * gameScale, paddle.width + 30 * gameScale);
                    activeEffects.wide = Date.now() + powerUp.duration;
                    break;
                case 'narrow':
                    paddle.width = Math.max(50 * gameScale, paddle.width - 20 * gameScale);
                    activeEffects.narrow = Date.now() + powerUp.duration;
                    break;
                case 'multiball':
                    if (balls.length > 0) {
                        const o = balls[0];
                        balls.push({ x: o.x, y: o.y, vx: -o.vx, vy: o.vy, speed: o.speed, isFire: false });
                        balls.push({ x: o.x, y: o.y, vx: o.vx * 0.5, vy: o.vy, speed: o.speed, isFire: false });
                    }
                    break;
                case 'slow':
                    balls.forEach(ball => { ball.speed *= 0.6; ball.vx *= 0.6; ball.vy *= 0.6; });
                    activeEffects.slow = Date.now() + powerUp.duration;
                    break;
                case 'fast':
                    balls.forEach(ball => { ball.speed *= 1.5; ball.vx *= 1.5; ball.vy *= 1.5; });
                    activeEffects.fast = Date.now() + powerUp.duration;
                    break;
                case 'extralife':
                    gameState.lives++;
                    break;
            }
            updateUI();
        }

        function updateEffects() {
            const now = Date.now();
            if (activeEffects.wide && now > activeEffects.wide) { paddle.width = C.PADDLE_WIDTH; delete activeEffects.wide; }
            if (activeEffects.narrow && now > activeEffects.narrow) { paddle.width = C.PADDLE_WIDTH; delete activeEffects.narrow; }
            if (activeEffects.slow && now > activeEffects.slow) {
                balls.forEach(ball => { ball.speed /= 0.6; ball.vx /= 0.6; ball.vy /= 0.6; });
                delete activeEffects.slow;
            }
            if (activeEffects.fast && now > activeEffects.fast) {
                balls.forEach(ball => { ball.speed /= 1.5; ball.vx /= 1.5; ball.vy /= 1.5; });
                delete activeEffects.fast;
            }
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random() - 0.5) * 8 * gameScale, vy: (Math.random() - 0.5) * 8 * gameScale, life: 1, color });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.2 * gameScale; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function loseLife() {
            gameState.lives--;
            gameState.combo = 0;
            updateUI();
            if (gameState.lives <= 0) gameOver();
            else {
                balls = [{ x: canvas.width / 2, y: C.PADDLE_Y - C.BALL_RADIUS - 1,
                    vx: 3 * gameScale * (Math.random() > 0.5 ? 1 : -1),
                    vy: -(4 + gameState.level * 0.5) * gameScale,
                    speed: (4 + gameState.level * 0.5) * gameScale, isFire: false }];
                paddle.x = canvas.width / 2 - paddle.width / 2;
            }
        }

        function checkLevelComplete() {
            const remaining = bricks.flat().filter(b => b.visible).length;
            if (remaining === 0) {
                if (gameState.level >= 5) gameWin();
                else {
                    gameState.level++;
                    paddle.width = C.PADDLE_WIDTH;
                    activeEffects = {};
                    initLevel(gameState.level);
                    showOverlay('levelCompleteOverlay');
                    setTimeout(() => hideOverlay('levelCompleteOverlay'), 2000);
                }
                updateUI();
            }
        }

        function gameOver() {
            gameState.isRunning = false;
            gameState.isGameOver = true;
            document.getElementById('finalScore').textContent = gameState.score;
            showOverlay('gameOverOverlay');
            pauseBtn.disabled = true;
            startBtn.disabled = false;
        }

        function gameWin() {
            gameState.isRunning = false;
            gameState.isWin = true;
            document.getElementById('winScore').textContent = gameState.score;
            showOverlay('winOverlay');
            pauseBtn.disabled = true;
            startBtn.disabled = false;
        }

        // ==================== 渲染 ====================
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40 * gameScale) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40 * gameScale) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // 砖块
            bricks.forEach(row => row.forEach(brick => {
                if (brick.visible) {
                    const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
                    gradient.addColorStop(0, brick.color);
                    gradient.addColorStop(1, adjustColor(brick.color, -40));
                    ctx.fillStyle = gradient;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(brick.x, brick.y, brick.width, 3 * gameScale);
                    if (brick.maxHealth > 1) {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                        ctx.font = `${10 * gameScale}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.fillText('❤'.repeat(brick.health), brick.x + brick.width/2, brick.y + brick.height/2 + 3 * gameScale);
                    }
                }
            }));

            // 挡板
            const paddleGradient = ctx.createLinearGradient(paddle.x, C.PADDLE_Y, paddle.x, C.PADDLE_Y + C.PADDLE_HEIGHT);
            paddleGradient.addColorStop(0, '#00c9ff');
            paddleGradient.addColorStop(1, '#00ff88');
            ctx.fillStyle = paddleGradient;
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.fillRect(paddle.x, C.PADDLE_Y, paddle.width, C.PADDLE_HEIGHT);
            ctx.shadowBlur = 0;

            // 球
            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, C.BALL_RADIUS, 0, Math.PI * 2);
                const ballGradient = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, C.BALL_RADIUS);
                ballGradient.addColorStop(0, ball.isFire ? '#ff6600' : '#ffffff');
                ballGradient.addColorStop(1, ball.isFire ? '#ff0000' : '#00ffff');
                ctx.fillStyle = ballGradient;
                ctx.shadowColor = ball.isFire ? '#ff6600' : '#00ffff';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // 道具
            powerUps.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(p.x - p.width/2, p.y, p.width, p.height, 5);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.font = `bold ${8 * gameScale}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(p.effect.substring(0, 3).toUpperCase(), p.x, p.y + p.height/2 + 3 * gameScale);
            });

            // 粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * gameScale, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // 连击
            if (gameState.combo >= 5) {
                ctx.fillStyle = `rgba(255, 215, 0, ${Math.min(1, gameState.combo / 20)})`;
                ctx.font = `bold ${20 * gameScale}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(`${gameState.combo} COMBO!`, canvas.width / 2, canvas.height * 0.3);
            }
        }

        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // ==================== 游戏循环 ====================
        function gameLoop() {
            if (gameState.isRunning) { update(); draw(); requestAnimationFrame(gameLoop); }
        }

        // ==================== UI 更新 ====================
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = '❤️'.repeat(gameState.lives);
            document.getElementById('level').textContent = gameState.level;
        }

        function showOverlay(id) { document.getElementById(id).classList.add('active'); }
        function hideOverlay(id) { document.getElementById(id).classList.remove('active'); }

        function togglePause() {
            if (!gameState.isRunning || gameState.isGameOver || gameState.isWin) return;
            gameState.isPaused = !gameState.isPaused;
            document.getElementById('pauseBtn').textContent = gameState.isPaused ? '▶️ 继续' : '⏸️ 暂停';
            document.getElementById('pauseScore').textContent = gameState.score;
            if (gameState.isPaused) showOverlay('pauseOverlay');
            else hideOverlay('pauseOverlay');
        }

        function startGame() {
            initGame();
            gameState.isRunning = true;
            gameState.isPaused = false;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            hideOverlay('startOverlay');
            gameLoop();
        }

        function restartGame() {
            initGame();
            gameState.isRunning = true;
            gameState.isPaused = false;
            gameState.isGameOver = false;
            gameState.isWin = false;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
            hideOverlay('gameOverOverlay');
            hideOverlay('winOverlay');
            hideOverlay('pauseOverlay');
            gameLoop();
        }

        // ==================== 按钮事件 ====================
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');

        startBtn.addEventListener('click', () => { if (!gameState.isRunning) startGame(); });
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        // ==================== 初始化 ====================
        window.addEventListener('resize', () => { resizeCanvas(); if (!gameState.isRunning) draw(); });
        resizeCanvas();
        updateUI();
        showOverlay('startOverlay');
    </script>
</body>
</html>
