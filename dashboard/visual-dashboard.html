<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra Dashboard - 可视化监控</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="charts.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(0, 217, 255, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.8)); }
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 217, 255, 0.2);
        }

        .chart-card h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #00d9ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-card h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d9ff, #00ff88);
            border-radius: 2px;
        }

        .chart-container {
            width: 100%;
            height: 300px;
        }

        .full-width {
            grid-column: span 2;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(0, 255, 136, 0.1));
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .refresh-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 217, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .refresh-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 1.8rem;
            }

            .chart-container {
                height: 250px;
            }

            .container {
                padding: 10px;
            }
        }

        /* 小屏幕手机 */
        @media (max-width: 375px) {
            .stats-bar {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="refresh-indicator">
        <div class="refresh-dot"></div>
        <span>每 5 秒自动刷新</span>
    </div>

    <div class="container">
        <header>
            <h1>🎻 Orchestra Dashboard</h1>
            <p class="subtitle">AI 编辑部协作系统 · 实时监控面板</p>
        </header>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="total-agents">7</div>
                <div class="stat-label">总 Agent 数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="running-agents">3</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completed-tasks">156</div>
                <div class="stat-label">已完成任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-tokens">24.5K</div>
                <div class="stat-label">Token 消耗</div>
            </div>
        </div>

        <!-- 图表网格 -->
        <div class="dashboard-grid">
            <!-- Token 消耗折线图 -->
            <div class="chart-card">
                <h2>Token 消耗趋势</h2>
                <div id="token-chart" class="chart-container"></div>
            </div>

            <!-- Agent 状态饼图 -->
            <div class="chart-card">
                <h2>Agent 状态分布</h2>
                <div id="status-chart" class="chart-container"></div>
            </div>

            <!-- 成本对比柱状图 -->
            <div class="chart-card">
                <h2>Agent 成本对比</h2>
                <div id="cost-chart" class="chart-container"></div>
            </div>

            <!-- 任务成功率 -->
            <div class="chart-card">
                <h2>任务成功率</h2>
                <div id="success-chart" class="chart-container"></div>
            </div>

            <!-- 甘特图（全宽） -->
            <div class="chart-card full-width">
                <h2>Agent 执行时间线</h2>
                <div id="gantt-chart" class="chart-container" style="height: 350px;"></div>
            </div>
        </div>

        <div class="footer">
            <p>Orchestra Dashboard v1.0 | 最后更新：<span id="last-update">--:--:--</span></p>
        </div>
    </div>

    <script src="charts.js"></script>
</body>
</html>
